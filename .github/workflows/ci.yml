name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  basic-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js if project exists
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm ci

      - name: Build application
        if: ${{ hashFiles('package.json') != '' }}
        run: npm run build --if-present

      - name: No app scaffold yet
        if: ${{ hashFiles('package.json') == '' }}
        run: echo "No package.json yet. CI baseline is active and ready for Milestone 1."